repos:
  - repo: local
    hooks:
      - id: python-compile-github-scripts
        name: python compile .github/scripts
        entry: bash -lc 'python3 -m compileall .github/scripts'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: cargo-codegen-check
        name: cargo codegen check
        entry: bash -lc 'cargo run -p codegen -- --check'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: cargo-test
        name: cargo test
        entry: bash -lc 'cargo test --locked'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
